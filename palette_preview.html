<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevPulse — Palette Chooser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    color: #f0f0f0;
    font-family: 'DM Sans', sans-serif;
    padding: 40px 32px 80px;
    min-height: 100vh;
  }

  .page-header {
    text-align: center;
    margin-bottom: 56px;
  }
  .page-header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.04em;
    margin-bottom: 10px;
  }
  .page-header p {
    color: #777;
    font-size: 1rem;
    line-height: 1.6;
  }
  .page-header .badge {
    display: inline-block;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    color: #aaa;
    font-size: 0.73rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 50px;
    margin-bottom: 18px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(580px, 1fr));
    gap: 32px;
    max-width: 1320px;
    margin: 0 auto;
  }

  /* ── Palette card ── */
  .palette-card {
    border-radius: 20px;
    overflow: hidden;
    border: 1.5px solid rgba(255,255,255,.07);
    transition: transform .22s, border-color .22s, box-shadow .22s;
    cursor: pointer;
    position: relative;
  }
  .palette-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent, rgba(255,255,255,.2));
    box-shadow: 0 12px 40px rgba(0,0,0,.5), 0 0 0 1px var(--accent, rgba(255,255,255,.1));
  }
  .palette-card .badge-number {
    position: absolute;
    top: 16px; right: 16px;
    width: 30px; height: 30px;
    background: rgba(0,0,0,.4);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700;
    color: rgba(255,255,255,.6);
    font-family: 'Space Grotesk', sans-serif;
    z-index: 10;
  }

  /* Dark half */
  .dark-half {
    padding: 24px 24px 20px;
  }
  /* Light half */
  .light-half {
    padding: 20px 24px 24px;
    border-top: 1px solid rgba(0,0,0,.12);
  }

  .palette-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 3px;
  }
  .palette-tagline {
    font-size: 0.78rem;
    opacity: 0.55;
    margin-bottom: 18px;
  }

  /* Color swatches */
  .swatches {
    display: flex;
    gap: 6px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .swatch {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .swatch-dot {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,.08);
    flex-shrink: 0;
  }
  .swatch-label {
    font-size: 0.58rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    opacity: 0.5;
    font-family: 'Fira Code', monospace;
  }

  /* Mini UI preview */
  .mini-ui {
    border-radius: 12px;
    padding: 14px;
    border: 1.5px solid rgba(255,255,255,.06);
    margin-bottom: 14px;
  }
  .mini-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .mini-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    letter-spacing: -0.02em;
  }
  .mini-btn {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 0.72rem;
    font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    border: none;
    cursor: pointer;
  }
  .mini-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }
  .mini-tab {
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 0.7rem;
    font-weight: 500;
    cursor: pointer;
  }
  .mini-metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .mini-metric {
    padding: 10px;
    border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,.06);
  }
  .mini-metric-label {
    font-size: 0.58rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 4px;
    opacity: 0.5;
    font-family: 'Space Grotesk', sans-serif;
  }
  .mini-metric-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  /* Mini chart bars */
  .mini-chart {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 40px;
    padding: 0 2px;
  }
  .mini-bar {
    flex: 1;
    border-radius: 3px 3px 0 0;
    opacity: 0.85;
  }
  /* Badges */
  .mini-badge-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .mini-badge {
    padding: 3px 9px;
    border-radius: 50px;
    font-size: 0.67rem;
    font-weight: 700;
    letter-spacing: .02em;
    border: 1px solid transparent;
  }

  /* Light side label */
  .side-label {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    opacity: 0.4;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .side-label::before {
    content: '';
    flex: 1;
    height: 1px;
    background: currentColor;
    opacity: 0.3;
  }
  .side-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: currentColor;
    opacity: 0.3;
  }

  /* Light mini UI */
  .light-mini-ui {
    border-radius: 12px;
    padding: 14px;
    border: 1.5px solid rgba(0,0,0,.08);
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
  }

  /* Select overlay */
  .select-overlay {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    border: 3px solid transparent;
    pointer-events: none;
    transition: border-color .2s;
  }
  .palette-card:hover .select-overlay {
    border-color: var(--accent);
  }
  .select-hint {
    text-align: center;
    font-size: 0.73rem;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 8px;
    margin-top: 4px;
    opacity: 0;
    transition: opacity .2s;
    font-family: 'Space Grotesk', sans-serif;
  }
  .palette-card:hover .select-hint { opacity: 1; }
</style>
</head>

function swatches(p, mode) {
  const d = p[mode];
  const items = [
    { color: d.bg,      label: "BG" },
    { color: d.surf,    label: "Surf" },
    { color: d.card,    label: "Card" },
    { color: d.accent,  label: "Primary" },
    { color: d.accent2, label: "Accent 2" },
    { color: d.pos,     label: "Positive" },
    { color: d.neg,     label: "Negative" },
    { color: d.text1,   label: "Text" },
    { color: d.text2,   label: "Text 2" },
    { color: d.border,  label: "Border" },
  ];
  return `<div class="swatches">${items.map(s =>
    `<div class="swatch">
      <div class="swatch-dot" style="background:${s.color};border-color:${mode==='dark'?'rgba(255,255,255,.1)':'rgba(0,0,0,.08)'}"></div>
      <span class="swatch-label" style="color:${d.text2}">${s.label}</span>
    </div>`
  ).join('')}</div>`;
}

function miniDark(p) {
  const d = p.dark;
  const barHeights = p.bars;
  const bars = barHeights.map((h, i) => {
    const color = i % 3 === 0 ? d.neg : i % 3 === 1 ? d.accent : d.pos;
    return `<div class="mini-bar" style="height:${h}%;background:${color}"></div>`;
  }).join('');

  return `
  <div class="mini-ui" style="background:${d.surf};border-color:${d.border}">
    <div class="mini-header">
      <div class="mini-logo" style="color:${d.text1}">Dev<span style="color:${d.accent}">Pulse</span></div>
      <button class="mini-btn" style="background:${d.accent};color:#000">Dashboard</button>
    </div>
    <div class="mini-tabs">
      <div class="mini-tab" style="background:${d.accent};color:#000;font-weight:700">Live Feed</div>
      <div class="mini-tab" style="color:${d.text2}">Trends</div>
      <div class="mini-tab" style="color:${d.text2}">Tools</div>
      <div class="mini-tab" style="color:${d.text2}">Reports</div>
    </div>
    <div class="mini-metrics">
      <div class="mini-metric" style="background:${d.card};border-color:${d.border}">
        <div class="mini-metric-label" style="color:${d.text3}">Posts</div>
        <div class="mini-metric-value" style="color:${d.text1}">12,847</div>
      </div>
      <div class="mini-metric" style="background:${d.card};border-color:${d.border}">
        <div class="mini-metric-label" style="color:${d.text3}">Sentiment</div>
        <div class="mini-metric-value" style="color:${d.pos}">+0.72</div>
      </div>
      <div class="mini-metric" style="background:${d.card};border-color:${d.border}">
        <div class="mini-metric-label" style="color:${d.text3}">Alerts</div>
        <div class="mini-metric-value" style="color:${d.neg}">3</div>
      </div>
    </div>
    <div class="mini-chart">${bars}</div>
    <div class="mini-badge-row">
      <span class="mini-badge" style="background:${d.pos}22;border-color:${d.pos}44;color:${d.pos}">positive</span>
      <span class="mini-badge" style="background:${d.neg}22;border-color:${d.neg}44;color:${d.neg}">spike alert</span>
      <span class="mini-badge" style="background:${d.accent}22;border-color:${d.accent}44;color:${d.accent}">trending</span>
    </div>
  </div>`;
}

function miniLight(p) {
  const l = p.light;
  const barHeights = p.bars;
  const bars = barHeights.map((h, i) => {
    const color = i % 3 === 0 ? l.neg : i % 3 === 1 ? l.accent : l.pos;
    return `<div class="mini-bar" style="height:${h}%;background:${color};opacity:0.8"></div>`;
  }).join('');

  return `
  <div class="light-mini-ui" style="background:${l.surf};border-color:${l.border}">
    <div class="mini-header">
      <div class="mini-logo" style="color:${l.text1}">Dev<span style="color:${l.accent}">Pulse</span></div>
      <button class="mini-btn" style="background:${l.accent};color:#fff">Dashboard</button>
    </div>
    <div class="mini-metrics">
      <div class="mini-metric" style="background:${l.card};border-color:${l.border};box-shadow:0 1px 4px rgba(0,0,0,.07)">
        <div class="mini-metric-label" style="color:${l.text3}">Posts</div>
        <div class="mini-metric-value" style="color:${l.text1}">12,847</div>
      </div>
      <div class="mini-metric" style="background:${l.card};border-color:${l.border};box-shadow:0 1px 4px rgba(0,0,0,.07)">
        <div class="mini-metric-label" style="color:${l.text3}">Sentiment</div>
        <div class="mini-metric-value" style="color:${l.pos}">+0.72</div>
      </div>
      <div class="mini-metric" style="background:${l.card};border-color:${l.border};box-shadow:0 1px 4px rgba(0,0,0,.07)">
        <div class="mini-metric-label" style="color:${l.text3}">Alerts</div>
        <div class="mini-metric-value" style="color:${l.neg}">3</div>
      </div>
    </div>
    <div class="mini-chart" style="margin-top:10px">${bars}</div>
    <div class="mini-badge-row" style="margin-top:8px">
      <span class="mini-badge" style="background:${l.pos}18;border-color:${l.pos}44;color:${l.pos}">positive</span>
      <span class="mini-badge" style="background:${l.neg}18;border-color:${l.neg}44;color:${l.neg}">spike alert</span>
      <span class="mini-badge" style="background:${l.accent}18;border-color:${l.accent}44;color:${l.accent}">trending</span>
    </div>
  </div>`;
}

const grid = document.getElementById('grid');

palettes.forEach(p => {
  const d = p.dark;
  const l = p.light;

  const card = document.createElement('div');
  card.className = 'palette-card';
  card.style.setProperty('--accent', p.accentHex);
  card.style.background = d.bg;

  card.innerHTML = `
    <div class="select-overlay"></div>
    <span class="badge-number">${p.id}</span>

    <!-- DARK HALF -->
    <div class="dark-half">
      <div class="palette-name" style="color:${d.text1}">${p.name}</div>
      <div class="palette-tagline" style="color:${d.text2}">${p.tagline}</div>

      <div class="side-label" style="color:${d.text3}">Dark mode</div>
      ${swatches(p, 'dark')}
      ${miniDark(p)}
    </div>

    <!-- LIGHT HALF -->
    <div class="light-half" style="background:${l.bg}">
      <div class="side-label" style="color:${l.text3}">Light mode</div>
      ${swatches(p, 'light')}
      ${miniLight(p)}
    </div>

    <div class="select-hint" style="background:${d.bg};color:${p.accentHex}">
      Click to apply this palette →
    </div>
  `;

  card.addEventListener('click', () => {
    alert(`You selected: "${p.name}" (Option ${p.id})\n\nGo back to Claude and say:\n"Apply palette ${p.id} — ${p.name}"`);
  });

  grid.appendChild(card);
});
</script>
