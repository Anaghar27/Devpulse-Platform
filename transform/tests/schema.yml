version: 2

models:
  - name: stg_raw_posts
    description: "Cleaned and typed raw posts from PostgreSQL"
    columns:
      - name: post_id
        description: "Unique post identifier"
        tests:
          - not_null
          - unique

      - name: source
        description: "Post source platform"
        tests:
          - not_null
          - accepted_values:
              values: ['reddit', 'hackernews']

      - name: title
        description: "Post title — must not be null after staging cleanup"
        tests:
          - not_null

      - name: score
        description: "Post score / upvotes"
        tests:
          - not_null

      - name: post_date
        description: "Date of post truncated to day"
        tests:
          - not_null

  - name: stg_processed_posts
    description: "Cleaned LLM classification output"
    columns:
      - name: post_id
        description: "Foreign key to stg_raw_posts"
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_raw_posts')
              field: post_id

      - name: sentiment
        description: "Classified sentiment"
        tests:
          - not_null
          - accepted_values:
              values: ['positive', 'negative', 'neutral']

      - name: emotion
        description: "Classified emotion"
        tests:
          - not_null
          - accepted_values:
              values: ['excited', 'frustrated', 'skeptical', 'curious', 'hopeful', 'neutral']

      - name: topic
        description: "Classified topic"
        tests:
          - not_null
          - accepted_values:
              values: ['LLM', 'Agents', 'RAG', 'MLOps', 'Python', 'WebDev', 'DevTools', 'Cloud', 'Hardware', 'Security', 'Career', 'OpenSource', 'Other']

      - name: controversy_score
        description: "Controversy score between 0 and 1"
        tests:
          - not_null

      - name: tool_mentioned
        description: "Tool mentioned in post — 'none' if absent"
        tests:
          - not_null

  - name: mart_daily_sentiment
    description: "Daily sentiment rollup by date, topic, tool, source"
    columns:
      - name: post_date
        tests:
          - not_null
      - name: topic
        tests:
          - not_null
      - name: post_count
        tests:
          - not_null
      - name: avg_sentiment
        tests:
          - not_null

  - name: mart_tool_comparison
    description: "Sentiment time series per tool per day"
    columns:
      - name: post_date
        tests:
          - not_null
      - name: tool
        tests:
          - not_null
      - name: post_count
        tests:
          - not_null

  - name: mart_community_divergence
    description: "Reddit vs HN sentiment delta per topic per day"
    columns:
      - name: post_date
        tests:
          - not_null
      - name: topic
        tests:
          - not_null
      - name: sentiment_delta
        tests:
          - not_null

  - name: mart_trending_topics
    description: "7-day rolling avg with spike detection per topic"
    columns:
      - name: post_date
        tests:
          - not_null
      - name: topic
        tests:
          - not_null
      - name: today_count
        tests:
          - not_null
      - name: spike_flag
        tests:
          - not_null
      - name: spike_flag
        tests:
          - accepted_values:
              values: [true, false]
