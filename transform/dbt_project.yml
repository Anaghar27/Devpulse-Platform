name: devpulse
version: "1.0.0"
config-version: 2

profile: devpulse

model-paths: ["models"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
docs-paths: ["docs"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  devpulse:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      # Incremental materialization — only processes new dates on each run.
      # Use 'dbt run --full-refresh' to rebuild complete history.
      # mart_trending_topics uses 8-day lookback for rolling average accuracy.
      +materialized: incremental
      +on_schema_change: sync_all_columns
